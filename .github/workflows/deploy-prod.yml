name: Deploy to Production

# IMPORTANT: Ce workflow est désactivé par défaut
# Pour l'activer, décommentez le bloc "on:" ci-dessous

# on:
#   push:
#     branches:
#       - master
#   workflow_dispatch:

on:
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy to atelier-sapi.fr
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        with:
          fetch-depth: 2

      - name: Deploy to O2Switch via FTP
        uses: SamKirkland/FTP-Deploy-Action@4.3.0
        with:
          server: ${{ secrets.FTP_SERVER_PROD }}
          username: ${{ secrets.FTP_USERNAME_PROD }}
          password: ${{ secrets.FTP_PASSWORD_PROD }}
          port: 21
          server-dir: /wp-content/themes/theme-sapi-maison/
          local-dir: ./
          exclude: |
            **/.git*
            **/.git*/**
            **/README.md
            **/.DS_Store
            **/node_modules/**
            **/.vscode/**
            **/.idea/**
