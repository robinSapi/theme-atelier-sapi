name: Deploy to Test Server

on:
  push:
    branches:
      - test-theme-sapi-maison
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy:
    name: Deploy to testLumineux.atelier-sapi.fr
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Deploy to O2Switch via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.6
        with:
          server: ${{ secrets.FTP_SERVER_TEST }}
          username: ${{ secrets.FTP_USERNAME_TEST }}
          password: ${{ secrets.FTP_PASSWORD_TEST }}
          port: 21
          server-dir: /wp-content/themes/theme-sapi-maison/
          local-dir: ./
          exclude: |
            **/.git*
            **/.git*/**
            **/README.md
            **/.DS_Store
            **/node_modules/**
            **/.vscode/**
            **/.idea/**
