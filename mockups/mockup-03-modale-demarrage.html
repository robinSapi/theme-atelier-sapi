<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mockup #3 — Modale écran démarrage 2 portes</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&family=Square+Peg&display=swap" rel="stylesheet">
<style>
  :root {
    --color-wood: #8B7355;
    --color-wood-dark: #4A3F35;
    --color-wood-mid: #6B5A4A;
    --color-warm: #F5F0E8;
    --color-orange: #E35B24;
    --color-orange-dark: #C44A1E;
    --color-line: rgba(147, 125, 104, 0.18);
    --color-bg: #FAFAF7;
    --shadow-card: 0 2px 8px rgba(147,125,104,0.12), 0 6px 28px rgba(147,125,104,0.15);
    --shadow-card-hover: 0 4px 14px rgba(147,125,104,0.16), 0 12px 44px rgba(147,125,104,0.22);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Montserrat', sans-serif;
    background: var(--color-bg);
    color: var(--color-wood-dark);
    line-height: 1.55;
    margin: 0;
  }

  /* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
     Modale plein écran
  ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
  .modal {
    position: fixed;
    inset: 0;
    background: var(--color-bg);
    z-index: 1000;
    display: flex;
    flex-direction: column;
    height: 100dvh;
  }

  .modal__header {
    flex-shrink: 0;
    padding: 18px 24px;
    border-bottom: 1px solid var(--color-line);
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: #fff;
  }
  .modal__title {
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--color-wood);
  }
  .modal__close {
    background: none;
    border: none;
    width: 36px;
    height: 36px;
    border-radius: 50%;
    cursor: pointer;
    color: var(--color-wood-dark);
    font-size: 22px;
    line-height: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.2s;
  }
  .modal__close:hover { background: var(--color-warm); }

  .modal__body {
    flex: 1;
    overflow-y: auto;
    padding: 40px 20px 80px;
    display: flex;
    align-items: flex-start;
    justify-content: center;
  }

  /* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
     Card "Conseil de Robin" — esthétique universelle
  ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
  .conseiller-card {
    position: relative;
    width: 100%;
    max-width: 880px;
    background: var(--color-warm);
    border-radius: 16px;
    padding: 56px 40px 56px;
    text-align: center;
  }
  .conseiller-card::before {
    content: '';
    position: absolute;
    inset: 12px;
    border: 1.5px dashed rgba(139, 115, 85, 0.35);
    border-radius: 12px;
    pointer-events: none;
  }

  .conseiller-card__badge {
    display: inline-flex;
    align-items: center;
    gap: 7px;
    padding: 7px 16px;
    background: var(--color-wood-dark);
    color: #fff;
    font-size: 10.5px;
    font-weight: 700;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    border-radius: 50px;
    margin-bottom: 26px;
  }
  .conseiller-card__badge svg { width: 11px; height: 11px; }

  .conseiller-card__title {
    font-family: 'Montserrat', sans-serif;
    font-weight: 700;
    font-size: clamp(22px, 3.4vw, 32px);
    color: var(--color-wood-dark);
    line-height: 1.2;
    text-transform: uppercase;
    margin-bottom: 14px;
    letter-spacing: 0.005em;
  }
  .conseiller-card__subtitle {
    font-size: 16px;
    color: var(--color-wood-mid);
    max-width: 540px;
    margin: 0 auto 36px;
    line-height: 1.55;
  }

  /* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
     Les 2 portes
  ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
  .portes {
    position: relative;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 20px;
    max-width: 720px;
    margin: 0 auto;
  }

  .porte {
    position: relative;
    background: #fff;
    border: 1px solid var(--color-line);
    border-radius: 12px;
    padding: 32px 26px 26px;
    text-align: center;
    cursor: pointer;
    transition: transform 0.2s, box-shadow 0.2s, border-color 0.2s;
    box-shadow: var(--shadow-card);
    font-family: inherit;
    color: inherit;
  }
  .porte:hover {
    transform: translateY(-2px);
    box-shadow: var(--shadow-card-hover);
    border-color: var(--color-wood);
  }

  .porte__icon {
    width: 56px;
    height: 56px;
    margin: 0 auto 18px;
    background: var(--color-warm);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--color-wood);
  }
  .porte__icon svg { width: 26px; height: 26px; }

  .porte__title {
    display: block;
    font-size: 14px;
    font-weight: 700;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--color-wood-dark);
    margin-bottom: 8px;
  }
  .porte__desc {
    display: block;
    font-size: 14px;
    color: var(--color-wood-mid);
    line-height: 1.5;
  }

  /* Séparateur "ou" entre les 2 portes (desktop horizontal, mobile vertical) */
  .portes__or {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 38px;
    height: 38px;
    border-radius: 50%;
    background: var(--color-warm);
    color: var(--color-wood);
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    display: flex;
    align-items: center;
    justify-content: center;
    pointer-events: none;
    z-index: 2;
    border: 1.5px solid rgba(139, 115, 85, 0.35);
  }

  /* Footer mockup */
  .mockup-footer {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    background: var(--color-wood-dark);
    color: #fff;
    padding: 12px 20px;
    text-align: center;
    font-size: 11px;
    opacity: 0.9;
    z-index: 999;
  }

  /* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ Mobile ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
  @media (max-width: 720px) {
    .modal__body {
      padding: 24px 14px 80px;
    }
    .conseiller-card {
      padding: 40px 22px 44px;
    }
    .conseiller-card::before { inset: 8px; }
    .conseiller-card__title { font-size: 22px; }
    .conseiller-card__subtitle { font-size: 15px; margin-bottom: 28px; }

    .portes {
      grid-template-columns: 1fr;
      gap: 28px;
    }
    .portes__or {
      top: 50%;
    }
    .porte { padding: 28px 20px 22px; }
    .porte__icon { width: 50px; height: 50px; }
    .porte__icon svg { width: 22px; height: 22px; }
  }
</style>
</head>
<body>

<div class="modal">

  <header class="modal__header">
    <span class="modal__title">Décrire mon projet</span>
    <button class="modal__close" aria-label="Fermer">×</button>
  </header>

  <div class="modal__body">

    <div class="conseiller-card">
      <span class="conseiller-card__badge">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M21.174 6.812a1 1 0 0 0-3.986-3.987L3.842 16.174a2 2 0 0 0-.5.83l-1.321 4.352a.5.5 0 0 0 .623.622l4.353-1.32a2 2 0 0 0 .83-.497z"/>
          <path d="m15 5 4 4"/>
        </svg>
        Conseil de Robin
      </span>

      <h2 class="conseiller-card__title">Comment voulez-vous me parler de votre projet ?</h2>
      <p class="conseiller-card__subtitle">
        Deux manières d'arriver à une sélection de luminaires adaptés à votre projet.
      </p>

      <div class="portes">
        <span class="portes__or" aria-hidden="true">ou</span>

        <!-- Porte A : Je choisis (cadré, simple) -->
        <button class="porte" type="button">
          <span class="porte__icon">
            <!-- icône checklist / propositions -->
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
              <rect x="4" y="4" width="16" height="16" rx="2"/>
              <path d="M8 10l2 2 4-4"/>
              <path d="M8 16h8"/>
            </svg>
          </span>
          <span class="porte__title">Je choisis</span>
          <span class="porte__desc">Robin pose ses questions, je sélectionne parmi ses propositions.</span>
        </button>

        <!-- Porte B : Je décris (libre, IA accompagne) -->
        <button class="porte" type="button">
          <span class="porte__icon">
            <!-- icône plume / texte libre -->
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
              <path d="M12 19l7-7 3 3-7 7-3-3z"/>
              <path d="M18 13l-1.5-7.5L2 2l3.5 14.5L13 18l5-5z"/>
              <path d="M2 2l7.586 7.586"/>
              <circle cx="11" cy="11" r="2"/>
            </svg>
          </span>
          <span class="porte__title">Je décris</span>
          <span class="porte__desc">Je raconte mon projet à Robin, l'IA m'accompagne pour préciser.</span>
        </button>
      </div>

    </div>

  </div>

</div>

<div class="mockup-footer">
  Mockup #3 — Modale écran démarrage · 2 portes · esthétique Conseiller alignée sur card #1
</div>

</body>
</html>
